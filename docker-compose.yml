# ================================================================
# 服务器操作审计系统 — Docker 部署
# ================================================================
# 生产模式 (默认, 服务端 + MockBCOS 进程内):
#   docker-compose up -d
#
# 生产模拟 (4 独立 MockBCOS 节点容器 + API + ES):
#   docker-compose --profile production_sim up -d
#
# 演示 (MockBCOS, 无需容器):
#   make demo
# ================================================================

services:
  # ================================================================
  # 生产模拟: 4 个 MockBCOS 节点容器
  # ================================================================
  mock-node0:
    build:
      context: .
      dockerfile: Dockerfile.node
    container_name: mock-node0
    ports:
      - "6000:6000"
    environment:
      - NODE_ID=node_0
      - NODE_PORT=6000
      - NODE_BYZANTINE=false
    networks:
      - audit-chain-net
    restart: unless-stopped
    profiles: ["production_sim"]

  mock-node1:
    build:
      context: .
      dockerfile: Dockerfile.node
    container_name: mock-node1
    ports:
      - "6001:6000"
    environment:
      - NODE_ID=node_1
      - NODE_PORT=6000
      - NODE_BYZANTINE=false
    networks:
      - audit-chain-net
    restart: unless-stopped
    profiles: ["production_sim"]

  mock-node2:
    build:
      context: .
      dockerfile: Dockerfile.node
    container_name: mock-node2
    ports:
      - "6002:6000"
    environment:
      - NODE_ID=node_2
      - NODE_PORT=6000
      - NODE_BYZANTINE=false
    networks:
      - audit-chain-net
    restart: unless-stopped
    profiles: ["production_sim"]

  mock-node3:
    build:
      context: .
      dockerfile: Dockerfile.node
    container_name: mock-node3
    ports:
      - "6003:6000"
    environment:
      - NODE_ID=node_3
      - NODE_PORT=6000
      - NODE_BYZANTINE=true
    networks:
      - audit-chain-net
    restart: unless-stopped
    profiles: ["production_sim"]

  # ================================================================
  # 审计 API (所有模式共用)
  # ================================================================
  audit-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: audit-api
    ports:
      - "5000:5000"
    environment:
      - AUDIT_SYSTEM_MODE=${AUDIT_SYSTEM_MODE:-demo}
      - MOCK_NODE_URLS=${MOCK_NODE_URLS:-}
      - FLASK_APP=src.api.routes
    networks:
      - audit-chain-net
    restart: unless-stopped

  # ================================================================
  # Elasticsearch (可选)
  # ================================================================
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: audit-es
    ports:
      - "9200:9200"
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    volumes:
      - es-data:/usr/share/elasticsearch/data
    networks:
      - audit-chain-net
    restart: unless-stopped
    profiles: ["production_sim"]

volumes:
  es-data:

networks:
  audit-chain-net:
    driver: bridge

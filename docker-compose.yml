# ================================================================
# 服务器操作审计系统 — Docker 部署
# ================================================================
# 默认启动 (demo 模式, MockBCOS, 1 容器):
#   docker-compose up -d
#
# 带 ES (production 模式):
#   docker-compose --profile es up -d
# ================================================================
# 注: FISCO BCOS 多节点部署需要官方 build_chain 工具生成配置
# 参见: https://fisco-bcos-documentation.readthedocs.io
# ================================================================

services:
  audit-api:
    build: .
    container_name: audit-api
    ports:
      - "5000:5000"
    environment:
      - AUDIT_SYSTEM_MODE=demo
      - FLASK_APP=src.api.routes
      - ES_HOST=elasticsearch:9200
    restart: unless-stopped

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: audit-es
    ports:
      - "9200:9200"
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    volumes:
      - es-data:/usr/share/elasticsearch/data
    restart: unless-stopped
    profiles: ["es"]

volumes:
  es-data:

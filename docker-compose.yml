# ================================================================
# 服务器操作审计系统 — 服务器端部署
# ================================================================
# 用途：部署到服务器，运行 BCOS 4 节点联盟链 + ES + API
# 启动：docker-compose up -d
# 验证：curl http://localhost:5000/api/v1/audit/chain/info
# ================================================================

services:
  # ---- 审计 API ----
  audit-api:
    build: .
    container_name: audit-api
    ports:
      - "5000:5000"
    environment:
      - AUDIT_SYSTEM_MODE=production_sim
      - BCOS_ENDPOINT=bcos-node1:20200
      - ES_HOST=elasticsearch:9200
    depends_on:
      elasticsearch:
        condition: service_started
    networks:
      - audit-chain-net
    restart: unless-stopped

  # ---- FISCO BCOS 联盟链 4 节点 ----
  bcos-node1:
    image: fiscoorg/fiscobcos:v3.0.0
    container_name: bcos-node1
    command: fisco-bcos -c /etc/fisco/config.toml
    ports:
      - "20200:20200"
    volumes:
      - ./bcos/conf/config.toml:/etc/fisco/config.toml
      - bcos-data1:/data
    networks:
      - audit-chain-net
    environment:
      - FISCO_NODE_ID=node1
    restart: unless-stopped

  bcos-node2:
    image: fiscoorg/fiscobcos:v3.0.0
    container_name: bcos-node2
    command: fisco-bcos -c /etc/fisco/config.toml
    ports:
      - "20201:20200"
    volumes:
      - ./bcos/conf/config.toml:/etc/fisco/config.toml
      - bcos-data2:/data
    networks:
      - audit-chain-net
    environment:
      - FISCO_NODE_ID=node2
    restart: unless-stopped

  bcos-node3:
    image: fiscoorg/fiscobcos:v3.0.0
    container_name: bcos-node3
    command: fisco-bcos -c /etc/fisco/config.toml
    ports:
      - "20202:20200"
    volumes:
      - ./bcos/conf/config.toml:/etc/fisco/config.toml
      - bcos-data3:/data
    networks:
      - audit-chain-net
    environment:
      - FISCO_NODE_ID=node3
    restart: unless-stopped

  bcos-node4:
    image: fiscoorg/fiscobcos:v3.0.0
    container_name: bcos-node4
    command: fisco-bcos -c /etc/fisco/config.toml
    ports:
      - "20203:20200"
    volumes:
      - ./bcos/conf/config.toml:/etc/fisco/config.toml
      - bcos-data4:/data
    networks:
      - audit-chain-net
    environment:
      - FISCO_NODE_ID=node4
    restart: unless-stopped

  # ---- Elasticsearch ----
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: audit-es
    ports:
      - "9200:9200"
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    volumes:
      - es-data:/usr/share/elasticsearch/data
    networks:
      - audit-chain-net
    restart: unless-stopped

volumes:
  bcos-data1:
  bcos-data2:
  bcos-data3:
  bcos-data4:
  es-data:

networks:
  audit-chain-net:
    driver: bridge

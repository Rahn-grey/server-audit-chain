# ================================================================
# 服务器操作审计系统 — 服务器端部署
# ================================================================
# 架构:
#   ┌─────────────────────────────────────────────────────┐
#   │ 服务器 (本文件部署)                                  │
#   │   audit-api ← ES ← BCOS 4节点联盟链 (PBFT共识)      │
#   │   ↑ 5000 端口接收日志                               │
#   └─────────────────────────────────────────────────────┘
#              ↑ POST /api/v1/audit/batch
#   ┌──────────┴──────────────────────────────────────────┐
#   │ 客户端 (每台被审计机器, python 直接跑)              │
#   │   shell hook → collector agent → 日志推送到服务器   │
#   └─────────────────────────────────────────────────────┘
#
# 启动:
#   docker-compose up -d
# ================================================================

services:
  # ---- 审计 API (接收日志 / 上链) ----
  audit-api:
    build: .
    container_name: audit-api
    ports:
      - "5000:5000"
    environment:
      - AUDIT_SYSTEM_MODE=production_sim
      - FLASK_APP=src.api.routes
      - BCOS_ENDPOINT=bcos-node1:20200
      - ES_HOST=elasticsearch:9200
    depends_on:
      elasticsearch:
        condition: service_started
      bcos-node1:
        condition: service_started
    networks:
      - audit-chain-net
    restart: unless-stopped

  # ---- FISCO BCOS 联盟链 4 节点 (PBFT) ----
  bcos-node1:
    image: fiscoorg/fiscobcos:latest
    container_name: bcos-node1
    ports:
      - "20200:20200"
    volumes:
      - ./bcos/conf/config.toml:/etc/fisco/config.toml
      - bcos-data1:/data
    networks:
      - audit-chain-net
    environment:
      - FISCO_NODE_ID=node1
    restart: unless-stopped

  bcos-node2:
    image: fiscoorg/fiscobcos:latest
    container_name: bcos-node2
    ports:
      - "20201:20200"
    volumes:
      - ./bcos/conf/config.toml:/etc/fisco/config.toml
      - bcos-data2:/data
    networks:
      - audit-chain-net
    environment:
      - FISCO_NODE_ID=node2
    restart: unless-stopped

  bcos-node3:
    image: fiscoorg/fiscobcos:latest
    container_name: bcos-node3
    ports:
      - "20202:20200"
    volumes:
      - ./bcos/conf/config.toml:/etc/fisco/config.toml
      - bcos-data3:/data
    networks:
      - audit-chain-net
    environment:
      - FISCO_NODE_ID=node3
    restart: unless-stopped

  bcos-node4:
    image: fiscoorg/fiscobcos:latest
    container_name: bcos-node4
    ports:
      - "20203:20200"
    volumes:
      - ./bcos/conf/config.toml:/etc/fisco/config.toml
      - bcos-data4:/data
    networks:
      - audit-chain-net
    environment:
      - FISCO_NODE_ID=node4
    restart: unless-stopped

  # ---- Elasticsearch ----
  elasticsearch:
    image: elasticsearch:8.11.0
    container_name: audit-es
    ports:
      - "9200:9200"
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms1g -Xmx1g"
    volumes:
      - es-data:/usr/share/elasticsearch/data
    networks:
      - audit-chain-net
    restart: unless-stopped

volumes:
  bcos-data1:
  bcos-data2:
  bcos-data3:
  bcos-data4:
  es-data:

networks:
  audit-chain-net:
    driver: bridge

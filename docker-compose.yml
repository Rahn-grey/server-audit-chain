# ================================================================
# 服务器操作审计系统 — Docker 部署
# ================================================================
# 架构:
#   MockBCOS 自有联盟链 (替代 FISCO BCOS)
#   4 节点 PBFT 共识引擎集成在 audit-api 进程内
#
# 启动:
#   docker-compose up -d                         # 生产模式
#   docker-compose --profile es up -d             # 生产模式 + ES
#   make demo                                     # 演示模式(无容器)
# ================================================================

services:
  # ---- 审计 API (内置 MockBCOS 联盟链) ----
  audit-api:
    build: .
    container_name: audit-api
    ports:
      - "5000:5000"
    environment:
      - AUDIT_SYSTEM_MODE=demo
      - FLASK_APP=src.api.routes
      - ES_HOST=${ES_HOST:-elasticsearch:9200}
    depends_on:
      elasticsearch:
        condition: service_started
    networks:
      - audit-chain-net
    restart: unless-stopped

  # ---- Elasticsearch (可选) ----
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: audit-es
    ports:
      - "9200:9200"
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    volumes:
      - es-data:/usr/share/elasticsearch/data
    networks:
      - audit-chain-net
    restart: unless-stopped
    profiles: ["es"]

volumes:
  es-data:

networks:
  audit-chain-net:
    driver: bridge

# ================================================================
# 服务器操作审计系统 — Docker 部署
# ================================================================
# 生产模式 (服务端作为 BCOS 联盟链节点, 默认):
#   docker-compose up -d
#
# 生产模拟 (本地 6 节点 BCOS 测试):
#   bash scripts/setup_bcos_nodes.sh          # 初始化节点
#   docker-compose --profile production_sim up -d
#
# 演示模式 (MockBCOS, 无需 Docker):
#   make demo
# ================================================================

services:
  # ---- 审计 API ----
  audit-api:
    build: .
    container_name: audit-api
    ports:
      - "5000:5000"
    environment:
      - AUDIT_SYSTEM_MODE=production
      - FLASK_APP=src.api.routes
      - BCOS_ENDPOINT=${BCOS_ENDPOINT:-127.0.0.1:20200}
      - ES_HOST=${ES_HOST:-elasticsearch:9200}
    networks:
      - audit-chain-net
    restart: unless-stopped

  # ---- Elasticsearch ----
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: audit-es
    ports:
      - "9200:9200"
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    volumes:
      - es-data:/usr/share/elasticsearch/data
    networks:
      - audit-chain-net
    restart: unless-stopped

  # ================================================================
  # 生产模拟: 6 节点 FISCO BCOS (profile: production_sim)
  # ================================================================
  bcos-node1:
    image: fiscoorg/fiscobcos:v3.0.0
    container_name: bcos-node1
    ports:
      - "20200:20200"
    volumes:
      - ./bcos/conf/config.toml:/etc/fisco/config.toml
      - ./bcos/conf/config.genesis:/etc/fisco/config.genesis
      - ./bcos/nodes/node1/:/data
    networks:
      - audit-chain-net
    restart: unless-stopped
    profiles: ["production_sim"]
    command:
      - fisco-bcos
      - -c
      - /etc/fisco/config.toml
      - -g
      - /etc/fisco/config.genesis

  bcos-node2:
    image: fiscoorg/fiscobcos:v3.0.0
    container_name: bcos-node2
    ports:
      - "20201:20200"
    volumes:
      - ./bcos/conf/config.toml:/etc/fisco/config.toml
      - ./bcos/conf/config.genesis:/etc/fisco/config.genesis
      - ./bcos/nodes/node2/:/data
    networks:
      - audit-chain-net
    restart: unless-stopped
